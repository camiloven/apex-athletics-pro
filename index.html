<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronos Camiloven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body{font-family:system-ui,sans-serif;background:#09090b;color:white;margin:0;}
        .hero{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
        video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.45);}
        .neon{text-shadow:0 0 30px #eab308,0 0 60px #eab308;}
        .card{transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}
        .best{border:2px solid #22c55e!important;box-shadow:0 0 16px rgba(34,197,94,0.4);}
        .tab-active{background:#eab308!important;color:#000!important;}
        .tabs-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 2px;scrollbar-width:none;}
        .tabs-scroll::-webkit-scrollbar{display:none;}
        .day-header{background:linear-gradient(90deg,#1c1c1f 0%,#27272a 100%);border-left:3px solid #eab308;}
        .stat-pill{border-radius:12px;padding:8px 4px;text-align:center;}
        .nav-tab{flex:1;padding:8px 2px;text-align:center;font-size:9px;font-weight:bold;border-top:2px solid transparent;}
        .nav-tab.active{border-top-color:#eab308;color:#eab308;}
        .league-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:bold;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .spinner{animation:spin 1s linear infinite;}
    </style>
</head>
<body>
<div class="hero" id="introScreen">
    <video autoplay loop muted playsinline><source src="intro-video.mp4" type="video/mp4"></video>
    <div class="text-center relative z-10 px-6">
        <h1 class="text-7xl font-bold tracking-tighter neon">PRONOS CAMILOVEN</h1>
        <p class="text-yellow-400 mt-4 text-xl">by camiloven</p>
        <button onclick="goToNext()" class="mt-20 bg-yellow-400 text-black px-16 py-7 rounded-3xl text-2xl font-bold">Entrar</button>
    </div>
</div>
<div id="uploadScreen" class="hidden min-h-screen flex items-center justify-center px-6 bg-zinc-950">
    <div class="text-center max-w-md w-full">
        <div class="text-5xl mb-6">🔐</div>
        <h2 class="text-3xl font-bold mb-2">Ingrese la Clave</h2>
        <input type="password" id="passwordInput" placeholder="Clave de seguridad" class="w-full bg-zinc-800 text-white px-6 py-4 rounded-2xl text-xl mb-4 focus:outline-none focus:ring-2 focus:ring-yellow-400" onkeydown="if(event.key==='Enter') checkPassword()">
        <button onclick="checkPassword()" class="w-full py-5 bg-yellow-400 text-black font-bold rounded-3xl text-xl">VERIFICAR</button>
    </div>
</div>
<div id="appScreen" class="hidden min-h-screen bg-zinc-950 flex flex-col">
    <div class="sticky top-0 bg-zinc-900/95 backdrop-blur border-b border-zinc-800 z-50">
        <div class="flex justify-between items-center px-4 pt-4 pb-2">
            <h1 class="text-xl font-bold neon">PRONOS CAMILOVEN</h1>
            <button onclick="goToUpload()" class="text-yellow-400 text-sm bg-zinc-800 px-3 py-1 rounded-full">↑ Archivo</button>
        </div>
        <div class="tabs-scroll px-4 pb-3" id="sportTabs"></div>
    </div>
    <div id="mainContent" class="flex-1 pb-32"></div>
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 z-50">
        <div class="flex">
            <button onclick="switchView('pronos')" id="navPronos" class="nav-tab active text-yellow-400">📋 Pronos</button>
            <button onclick="switchView('resultados')" id="navResultados" class="nav-tab text-zinc-400">🔍 Results</button>
            <button onclick="switchView('analisis')" id="navAnalisis" class="nav-tab text-zinc-400">🎯 Análisis</button>
            <button onclick="switchView('fuentes')" id="navFuentes" class="nav-tab text-zinc-400">🔗 Fuentes</button>
            <button onclick="switchView('config')" id="navConfig" class="nav-tab text-zinc-400">⚙️ Config</button>
        </div>
    </div>
</div>
<script>
const SECRET_PASSWORD="tuclave123";
const SPORT_ICONS={soccer:"⚽",tennis:"🎾",basketball:"🏀",hockey:"🏒",volleyball:"🏐",handball:"🤾"};
const LEAGUE_COLORS=['#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#f97316','#06b6d4','#84cc16','#ec4899','#14b8a6'];
let allData={},currentSport=null,currentView='pronos',leagueColorMap={},resultsCache={};
let betminesImgs=[],forebetImgs=[];
const USER_TZ=Intl.DateTimeFormat().resolvedOptions().timeZone;
function parseDate(str){if(!str)return null;const m=String(str).trim().match(/^(\d+)\.(\d+)\.(\d{4})(?:\s+(\d+):(\d+))?/);if(!m)return null;return new Date(Date.UTC(+m[3],+m[2]-1,+m[1],+m[4]||0,+m[5]||0));}
function getLocalTime(date){if(!date)return'';return date.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:USER_TZ});}
function getLocalDayKey(date){if(!date)return'sin-fecha';return date.toLocaleDateString('es-CL',{timeZone:USER_TZ});}
function getLocalDayLabel(date){if(!date)return'Sin fecha';const today=new Date(),tomorrow=new Date(today);tomorrow.setDate(today.getDate()+1);const opts={timeZone:USER_TZ,weekday:'short',day:'numeric',month:'short'};const todayKey=today.toLocaleDateString('es-CL',{timeZone:USER_TZ});const tomorrowKey=tomorrow.toLocaleDateString('es-CL',{timeZone:USER_TZ});const dateKey=date.toLocaleDateString('es-CL',{timeZone:USER_TZ});const label=date.toLocaleDateString('es-CL',opts);if(dateKey===todayKey)return'📅 Hoy — '+label;if(dateKey===tomorrowKey)return'📅 Mañana — '+label;return'📅 '+label;}
function goToNext(){document.getElementById('introScreen').style.display='none';if(Object.keys(allData).length>0)showApp(Object.keys(allData));else document.getElementById('uploadScreen').classList.remove('hidden');}
function checkPassword(){const v=document.getElementById('passwordInput').value.trim();if(v===SECRET_PASSWORD)loadExcel();else{alert("❌ Clave incorrecta");document.getElementById('passwordInput').value='';}}
function goToUpload(){document.getElementById('appScreen').classList.add('hidden');document.getElementById('uploadScreen').classList.remove('hidden');document.getElementById('passwordInput').value='';}
function loadExcel(){const input=document.createElement('input');input.type='file';input.accept='.xlsx';input.onchange=e=>{const reader=new FileReader();reader.onload=function(ev){const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});allData={};wb.SheetNames.forEach(name=>{const rows=XLSX.utils.sheet_to_json(wb.Sheets[name]);if(rows.length>0)allData[name]=rows;});localStorage.setItem('apexData',JSON.stringify(allData));resultsCache={};showApp(Object.keys(allData));};reader.readAsArrayBuffer(e.target.files[0]);};input.click();}
function showApp(sports){document.getElementById('uploadScreen').classList.add('hidden');document.getElementById('appScreen').classList.remove('hidden');buildLeagueColors(sports);buildTabs(sports);switchSport(sports[0]);}
function buildLeagueColors(sports){leagueColorMap={};let i=0;sports.forEach(sport=>{(allData[sport]||[]).forEach(row=>{const lg=row.league||'Sin liga';if(!leagueColorMap[lg]){leagueColorMap[lg]=LEAGUE_COLORS[i%LEAGUE_COLORS.length];i++;}});});}
function buildTabs(sports){document.getElementById('sportTabs').innerHTML=sports.map(s=>`<button id="tab-${s}" onclick="switchSport('${s}')" class="flex-shrink-0 px-4 py-2 rounded-full text-sm font-bold bg-zinc-800 text-zinc-300 transition-all">${SPORT_ICONS[s]||'🏟'} ${s.charAt(0).toUpperCase()+s.slice(1)} <span class="ml-1 text-xs opacity-60">${allData[s]?.length||0}</span></button>`).join('');}
function switchSport(sport){if(currentSport){const p=document.getElementById('tab-'+currentSport);if(p)p.classList.remove('tab-active');}currentSport=sport;const c=document.getElementById('tab-'+sport);if(c)c.classList.add('tab-active');if(currentView==='pronos')renderPronos(sport,allData[sport]||[]);else if(currentView==='resultados')renderResultados(sport);else if(currentView==='analisis')renderAnalisis();window.scrollTo(0,0);}
function switchView(view){currentView=view;['pronos','resultados','analisis','fuentes','config'].forEach(v=>{const btn=document.getElementById('nav'+v.charAt(0).toUpperCase()+v.slice(1));if(btn){btn.classList.toggle('active',v===view);btn.classList.toggle('text-yellow-400',v===view);btn.classList.toggle('text-zinc-400',v!==view);}});const st=document.getElementById('sportTabs').parentElement;if(view==='pronos'){st.style.display='';renderPronos(currentSport,allData[currentSport]||[]);}else if(view==='resultados'){st.style.display='';renderResultados(currentSport);}else if(view==='analisis'){st.style.display='none';renderAnalisis();}else if(view==='fuentes'){st.style.display='none';renderFuentes();}else if(view==='config'){st.style.display='none';renderConfig();}window.scrollTo(0,0);}
function pct(val){return Math.round((parseFloat(val)||0)*100);}
function pill(value,label,colorClass){return `<div class="stat-pill bg-zinc-800"><div class="${colorClass} text-lg font-bold">${value}</div><div class="text-zinc-500 text-xs mt-0.5">${label}</div></div>`;}
function renderPronos(sport,data){const container=document.getElementById('mainContent');container.innerHTML='';if(!data||data.length===0){container.innerHTML='<p class="text-zinc-500 text-center mt-16">Sin datos</p>';return;}const parsed=data.map(row=>({...row,_date:parseDate(row.date)}));parsed.sort((a,b)=>{const da=a._date?.getTime()||0,db=b._date?.getTime()||0;return da!==db?da-db:(a.league||'').localeCompare(b.league||'');});const byDay={};parsed.forEach(row=>{const dk=getLocalDayKey(row._date);if(!byDay[dk])byDay[dk]={label:getLocalDayLabel(row._date),leagues:{}};const lg=row.league||'Sin liga';if(!byDay[dk].leagues[lg])byDay[dk].leagues[lg]=[];byDay[dk].leagues[lg].push(row);});const wrap=document.createElement('div');wrap.className='p-4';Object.values(byDay).forEach(dayGroup=>{const dayDiv=document.createElement('div');dayDiv.className='day-header rounded-xl px-4 py-3 mb-4 mt-2';dayDiv.innerHTML='<span class="font-bold text-yellow-400">'+dayGroup.label+'</span>';wrap.appendChild(dayDiv);Object.entries(dayGroup.leagues).forEach(([leagueName,matches])=>{const color=leagueColorMap[leagueName]||'#eab308';const lgDiv=document.createElement('div');lgDiv.className='flex items-center gap-2 mb-3 ml-1 px-2';lgDiv.innerHTML=`<span class="league-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${leagueName}</span><span class="text-zinc-600 text-xs">${matches.length} partidos</span>`;wrap.appendChild(lgDiv);matches.forEach(row=>wrap.appendChild(buildCard(sport,row,color)));});});container.appendChild(wrap);}
function buildCard(sport,row,leagueColor){const div=document.createElement('div');div.className='card bg-zinc-900 rounded-2xl p-4 mb-3 border border-zinc-800';const timeStr=getLocalTime(row._date);const h=pct(row['1x2_h']),a=pct(row['1x2_a']);let statsHTML='';if(sport==='soccer'){const d=pct(row['1x2_d']),o15=pct(row['o_1.5']),o25=pct(row['o_2.5']),u25=pct(row['u_2.5']),u35=pct(row['u_3.5']);const best=Math.max(u25,u35);const isBest=best>55;if(isBest)div.classList.add('best');statsHTML='<div class="grid grid-cols-3 gap-2 mt-3">'+pill(h+'%','Local','text-yellow-400')+pill(d+'%','Empate','text-yellow-400')+pill(a+'%','Visita','text-yellow-400')+'</div>'+'<div class="grid grid-cols-4 gap-2 mt-2">'+pill(o15+'%','O 1.5','text-emerald-400')+pill(o25+'%','O 2.5','text-emerald-400')+pill(u25+'%','U 2.5',u25===best&&isBest?'text-green-300 font-bold':'text-sky-400')+pill(u35+'%','U 3.5',u35===best&&isBest?'text-green-300 font-bold':'text-sky-400')+'</div>';}else if(sport==='tennis'){const o25=pct(row['o_2.5']),u25=pct(row['u_2.5']);statsHTML='<div class="grid grid-cols-2 gap-2 mt-3">'+pill(h+'%','Local','text-yellow-400')+pill(a+'%','Visita','text-yellow-400')+'</div>'+'<div class="grid grid-cols-2 gap-2 mt-2">'+pill(o25+'%','O 2.5 sets','text-emerald-400')+pill(u25+'%','U 2.5 sets','text-sky-400')+'</div>';}else{statsHTML='<div class="grid grid-cols-2 gap-2 mt-3">'+pill(h+'%','Local','text-yellow-400')+pill(a+'%','Visita','text-yellow-400')+'</div>';}div.innerHTML=`<div class="flex justify-between items-start"><div class="flex-1 pr-2"><p class="font-bold text-sm leading-tight">${row.home||'?'} <span class="text-zinc-500">vs</span> ${row.away||'?'}</p></div>${timeStr?`<span class="text-xs font-bold px-2 py-1 rounded-lg flex-shrink-0" style="background:${leagueColor}22;color:${leagueColor}">${timeStr}</span>`:''}</div>${statsHTML}`;return div;}
async function fetchRealResults(sport,dates){const sportsKey=localStorage.getItem('sportsKey')||'';const endpoints={soccer:'https://v3.football.api-sports.io/fixtures?date=',basketball:'https://v1.basketball.api-sports.io/games?date=',hockey:'https://v1.hockey.api-sports.io/games?date=',volleyball:'https://v1.volleyball.api-sports.io/games?date=',handball:'https://v1.handball.api-sports.io/games?date=',tennis:'https://v1.tennis.api-sports.io/games?date='};const url=(endpoints[sport]||endpoints.soccer)+dates[0];try{const r=await fetch(url,{headers:{'x-apisports-key':sportsKey}});const j=await r.json();return j.response||[];}catch(e){return[];}}
function normalize(str){return String(str||'').toLowerCase().replace(/[^a-z0-9]/g,'').trim();}
function findMatch(row,apiGames){const h=normalize(row.home),a=normalize(row.away);for(const g of apiGames){const gh=normalize(g.teams?.home?.name||''),ga=normalize(g.teams?.away?.name||'');if((gh.includes(h)||h.includes(gh))&&(ga.includes(a)||a.includes(ga)))return g;}return null;}
async function renderResultados(sport){const container=document.getElementById('mainContent');const data=allData[sport]||[];if(!data.length){container.innerHTML='<p class="text-zinc-500 text-center mt-16">Sin datos</p>';return;}container.innerHTML=`<div class="flex flex-col items-center justify-center mt-24 gap-4"><div class="w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full spinner"></div><p class="text-zinc-400">Buscando resultados...</p></div>`;const cacheKey=sport+'_'+(data[0]?.date||'');if(resultsCache[cacheKey]){renderResultadosUI(sport,data,resultsCache[cacheKey]);return;}const dates=[...new Set(data.slice(0,20).map(r=>{const m=String(r.date||'').match(/(\d+)\.(\d+)\.(\d{4})/);return m?m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0'):'';}).filter(Boolean))];const apiGames=await fetchRealResults(sport,dates);const resultados=data.slice(0,20).map(row=>{const g=findMatch(row,apiGames);if(!g)return{marcador:'?',estado:'pendiente'};const sc=sport==='soccer'?g.goals:g.scores;const score=sport==='soccer'?(sc?.home!==null&&sc?.away!==null?sc.home+'-'+sc.away:null):(sc?.home?.total!==undefined?sc.home.total+'-'+sc.away.total:null);const finished=g.fixture?.status?.short==='FT'||g.status?.short==='FT';return{marcador:score||'?',estado:finished&&score?'finalizado':'pendiente'};});resultsCache[cacheKey]=resultados;renderResultadosUI(sport,data,resultados);}
function renderResultadosUI(sport,data,resultados){const container=document.getElementById('mainContent');container.innerHTML='';let aciertos=0,errores=0,pendientes=0;const wrap=document.createElement('div');wrap.className='p-4';const cards=data.slice(0,20).map((row,i)=>{const res=resultados[i]||{marcador:'?',estado:'pendiente'};const finalizado=res.estado==='finalizado'&&res.marcador!=='?';let acierto=null,pronostico='';if(finalizado){const parts=res.marcador.split('-').map(Number);const g1=parts[0]||0,g2=parts[1]||0;const ganador=g1>g2?'local':g2>g1?'visita':'empate';const probH=parseFloat(row['1x2_h']||0),probD=parseFloat(row['1x2_d']||0),probA=parseFloat(row['1x2_a']||0);const maxProb=Math.max(probH,probD||0,probA);let pg=maxProb===probH?'local':maxProb===probD?'empate':'visita';if(sport!=='soccer'&&!row['1x2_d'])pg=probH>probA?'local':'visita';acierto=pg===ganador;pronostico='Pronó: '+(pg==='local'?row.home:pg==='visita'?row.away:'Empate');}if(acierto===true)aciertos++;else if(acierto===false)errores++;else pendientes++;const color=leagueColorMap[row.league||'']||'#eab308';const timeStr=getLocalTime(parseDate(row.date));return `<div class="card bg-zinc-900 rounded-2xl p-4 mb-3 border ${acierto===true?'border-green-500':acierto===false?'border-red-500':'border-zinc-800'}"><div class="flex justify-between items-start mb-2"><div class="flex-1 pr-2"><p class="font-bold text-sm">${row.home||'?'} <span class="text-zinc-500">vs</span> ${row.away||'?'}</p><p class="text-xs mt-0.5" style="color:${color}">${row.league||''}</p></div><div class="text-right flex-shrink-0">${timeStr?`<p class="text-xs text-zinc-500">${timeStr}</p>`:''}<p class="text-2xl font-bold mt-1 ${finalizado?'text-white':'text-zinc-600'}">${res.marcador}</p></div></div><div class="flex justify-between items-center mt-2 pt-2 border-t border-zinc-800"><span class="text-xs text-zinc-500">${pronostico}</span><span class="text-lg">${acierto===true?'✅':acierto===false?'❌':'⏳'}</span></div></div>`;}).join('');const total=aciertos+errores;const pct_ac=total>0?Math.round(aciertos/total*100):0;wrap.innerHTML=`<div class="bg-zinc-900 rounded-2xl p-4 mb-4 border border-yellow-500/30"><p class="text-yellow-400 font-bold text-center mb-3">📊 Resumen</p><div class="grid grid-cols-3 gap-3 mb-3"><div class="text-center bg-green-500/10 rounded-xl p-3 border border-green-500/30"><div class="text-green-400 text-2xl font-bold">${aciertos}</div><div class="text-xs text-zinc-400">✅ Aciertos</div></div><div class="text-center bg-red-500/10 rounded-xl p-3 border border-red-500/30"><div class="text-red-400 text-2xl font-bold">${errores}</div><div class="text-xs text-zinc-400">❌ Errores</div></div><div class="text-center bg-zinc-800 rounded-xl p-3"><div class="text-zinc-300 text-2xl font-bold">${pendientes}</div><div class="text-xs text-zinc-400">⏳ Pendientes</div></div></div>${total>0?`<div class="bg-zinc-800 rounded-full h-3 overflow-hidden"><div class="h-full bg-green-500 rounded-full" style="width:${pct_ac}%"></div></div><p class="text-center text-sm mt-2 font-bold text-green-400">${pct_ac}% de acierto</p>`:''}</div><button onclick="resultsCache={};renderResultados('${sport}')" class="w-full py-3 bg-zinc-800 text-yellow-400 rounded-2xl text-sm font-bold mb-4">🔄 Actualizar</button>${cards}`;container.appendChild(wrap);}
async function grokVision(imgBase64,prompt){const key=localStorage.getItem('grokKey')||'';const r=await fetch('https://api.x.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'grok-2-vision-latest',max_tokens:600,messages:[{role:'user',content:[{type:'text',text:prompt},{type:'image_url',image_url:{url:'data:image/jpeg;base64,'+imgBase64}}]}]})});const j=await r.json();return j.choices?.[0]?.message?.content||'';}
async function grokText(prompt){const key=localStorage.getItem('grokKey')||'';const r=await fetch('https://api.x.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'grok-3-latest',max_tokens:1200,messages:[{role:'user',content:prompt}]})});const j=await r.json();return j.choices?.[0]?.message?.content||'';}
function renderAnalisis(){document.getElementById('mainContent').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold text-yellow-400 mb-4">🎯 Análisis Combinado</h2><div class="bg-zinc-900 rounded-2xl p-4 mb-4 border border-yellow-500/30"><p class="text-sm text-zinc-400 mb-3">Sube capturas de pronósticos del día</p><div class="grid grid-cols-2 gap-3"><div><p class="text-xs text-zinc-500 mb-2 font-bold">📸 BETMINES</p><label class="block w-full py-4 bg-zinc-800 rounded-2xl text-center text-sm cursor-pointer hover:bg-zinc-700">${betminesImgs.length>0?betminesImgs.length+' foto(s) ✅':'Seleccionar'}<input type="file" accept="image/*" multiple class="hidden" onchange="loadImgs(event,'betmines')"></label></div><div><p class="text-xs text-zinc-500 mb-2 font-bold">📸 FOREBET</p><label class="block w-full py-4 bg-zinc-800 rounded-2xl text-center text-sm cursor-pointer hover:bg-zinc-700">${forebetImgs.length>0?forebetImgs.length+' foto(s) ✅':'Seleccionar'}<input type="file" accept="image/*" multiple class="hidden" onchange="loadImgs(event,'forebet')"></label></div></div></div><button onclick="runAnalisis()" class="w-full py-5 bg-yellow-400 text-black font-bold rounded-3xl text-xl mb-4">🤖 Generar Análisis</button><div id="analisisResult"></div></div>`;}
function loadImgs(event,source){const files=Array.from(event.target.files);const arr=source==='betmines'?betminesImgs:forebetImgs;arr.length=0;let loaded=0;files.forEach(file=>{const reader=new FileReader();reader.onload=e=>{arr.push(e.target.result.split(',')[1]);loaded++;if(loaded===files.length)renderAnalisis();};reader.readAsDataURL(file);});}
async function runAnalisis(){
    const result=document.getElementById('analisisResult');
    if(!betminesImgs.length&&!forebetImgs.length){result.innerHTML='<p class="text-red-400 text-center">Sube al menos una captura</p>';return;}
    if(!localStorage.getItem('grokKey')){result.innerHTML='<p class="text-red-400 text-center">Configura tu clave Grok en ⚙️ Config</p>';return;}
    try{
        result.innerHTML=`<div class="flex flex-col items-center gap-3 mt-8"><div class="w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full spinner"></div><p class="text-zinc-400 text-sm">Paso 1: Leyendo Betmines...</p></div>`;
        let betTxt='Sin datos';
        if(betminesImgs.length){
            const textos=await Promise.all(betminesImgs.slice(0,2).map(img=>grokVision(img,'Lista los partidos y predicciones de BETMINES. Formato: "Equipo1 vs Equipo2: PREDICCION". Solo la lista.')));
            betTxt=textos.join('\n');
        }
        result.innerHTML=`<div class="flex flex-col items-center gap-3 mt-8"><div class="w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full spinner"></div><p class="text-zinc-400 text-sm">Paso 2: Leyendo Forebet...</p></div>`;
        let foreTxt='Sin datos';
        if(forebetImgs.length){
            const textos=await Promise.all(forebetImgs.slice(0,2).map(img=>grokVision(img,'Lista los partidos y predicciones de FOREBET. Formato: "Equipo1 vs Equipo2: PREDICCION %". Solo la lista.')));
            foreTxt=textos.join('\n');
        }
        result.innerHTML=`<div class="flex flex-col items-center gap-3 mt-8"><div class="w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full spinner"></div><p class="text-zinc-400 text-sm">Paso 3: Generando veredictos...</p></div>`;
        const prompt='BETMINES:\n'+betTxt+'\n\nFOREBET:\n'+foreTxt+'\n\nPor cada partido escribe exactamente este formato (una linea por partido):\nPartido: Equipo1 vs Equipo2 | Betmines: LOCAL | Forebet: LOCAL 65% | Veredicto: LOCAL | Confianza: 80 | Razon: ambos coinciden\n\nSolo las lineas, sin texto extra.';
        const resp=await grokText(prompt);
        document.getElementById('analisisResult').innerHTML='<p class="text-yellow-400 text-xs p-4">Respuesta de Grok:</p><pre class="text-xs text-zinc-400 px-4 overflow-auto whitespace-pre-wrap">'+resp.slice(0,800)+'</pre>';return;
        const partidos=lineas.map(l=>{
            const get=(key)=>{const i=l.indexOf(key);if(i<0)return'—';const v=l.slice(i+key.length);const j=v.indexOf(' | ');return(j>=0?v.slice(0,j):v).trim();};
            const verd=get('Veredicto:')||get('veredicto:')||'';const conf=parseInt(get('Confianza:')||get('confianza:'))||70;return{partido:get('Partido:')||get('partido:')||l.split('|')[0].trim(),betmines:get('Betmines:')||get('betmines:'),forebet:get('Forebet:')||get('forebet:'),veredicto:verd.toUpperCase()||'LOCAL',confianza:conf,razon:get('Razon:')||get('razon:')};
        });
        renderAnalisisResult(partidos);
    }catch(e){result.innerHTML=`<div class="text-center mt-8"><div class="text-4xl mb-3">⚠️</div><p class="text-zinc-400 mb-2">Error</p><p class="text-zinc-600 text-xs mb-4">${e.message}</p><button onclick="runAnalisis()" class="bg-yellow-400 text-black px-6 py-3 rounded-2xl font-bold">Reintentar</button></div>`;}
}
function renderAnalisisResult(partidos){const result=document.getElementById('analisisResult');if(!partidos.length){result.innerHTML='<p class="text-zinc-500 text-center mt-8">No se encontraron partidos</p>';return;}const colores={LOCAL:'border-green-500',EMPATE:'border-yellow-500',VISITA:'border-blue-500'};const iconos={LOCAL:'🏠',EMPATE:'🤝',VISITA:'✈️'};result.innerHTML='<p class="text-zinc-400 text-xs mb-3 font-bold uppercase tracking-widest">'+partidos.length+' partidos analizados</p>'+partidos.map(p=>{const conf=p.confianza||0;const colortxt=conf>=70?'text-green-400':conf>=50?'text-yellow-400':'text-zinc-400';const border=colores[p.veredicto]||'border-zinc-700';return `<div class="card bg-zinc-900 rounded-2xl p-4 mb-3 border ${border}"><p class="font-bold text-sm mb-3">${p.partido}</p><div class="space-y-1 mb-3"><div class="flex justify-between text-xs"><span class="text-zinc-500">⛏️ Betmines</span><span class="text-zinc-300">${p.betmines||'—'}</span></div><div class="flex justify-between text-xs"><span class="text-zinc-500">📈 Forebet</span><span class="text-zinc-300">${p.forebet||'—'}</span></div></div><div class="bg-zinc-800 rounded-xl p-3 flex justify-between items-center"><div><p class="text-xs text-zinc-500 mb-1">🎯 Veredicto</p><p class="font-bold text-lg">${iconos[p.veredicto]||''} ${p.veredicto||'—'}</p><p class="text-zinc-500 text-xs mt-1">${p.razon||''}</p></div><div class="text-right"><p class="${colortxt} text-3xl font-bold">${conf}%</p><p class="text-zinc-600 text-xs">confianza</p></div></div></div>`;}).join('');}

function renderConfig(){document.getElementById('mainContent').innerHTML=`<div class="p-4"><h2 class="text-xl font-bold text-yellow-400 mb-4">⚙️ Configuración</h2><div class="bg-zinc-900 rounded-2xl p-4 mb-4 border border-yellow-500/30 space-y-4"><div><p class="text-xs text-zinc-500 mb-2 font-bold">🔑 GROK xAI KEY (análisis imágenes)</p><input type="password" id="inputGrok" placeholder="xai-..." value="${localStorage.getItem('grokKey')||''}" class="w-full bg-zinc-800 text-white px-4 py-3 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"></div><div><p class="text-xs text-zinc-500 mb-2 font-bold">🔑 API-SPORTS KEY (resultados reales)</p><input type="password" id="inputSports" placeholder="tu clave..." value="${localStorage.getItem('sportsKey')||''}" class="w-full bg-zinc-800 text-white px-4 py-3 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"></div></div><button onclick="saveConfig()" class="w-full py-5 bg-yellow-400 text-black font-bold rounded-3xl text-xl">💾 Guardar</button><p class="text-zinc-600 text-xs text-center mt-3">Las claves se guardan solo en tu dispositivo 🔒</p></div>`;}
