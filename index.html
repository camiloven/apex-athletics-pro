<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pronos Camiloven</title>
    <meta name="description" content="Plataforma Premium de Pronósticos Deportivos con IA">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <link rel="stylesheet" href="styles.css?v=5">
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes letterIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
</head>
<body>

<!-- ===== Intro Screen ===== -->
<div class="hero" id="introScreen" style="background:#09090b;">
    <video autoplay loop muted playsinline style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.45);z-index:1;"><source src="intro-video.mp4" type="video/mp4"></video>
    <canvas id="particles-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;"></canvas>
    <div style="position:relative;z-index:10;text-align:center;padding:24px;max-width:100%;word-break:break-word;">
        <h1 id="heroTitle" style="font-size:3rem;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#eab308,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;">PRONOS CAMILOVEN</h1>
        <p id="heroSub" style="color:#eab308;margin-top:12px;font-size:1.1rem;font-weight:500;opacity:0;animation:fadeInUp 0.6s 1s forwards;">by camiloven</p>
        <button onclick="goToNext()" id="btnEntrar"
            style="margin-top:60px;background:#eab308;color:#000;padding:18px 64px;border-radius:24px;font-size:1.4rem;font-weight:900;border:none;cursor:pointer;opacity:0;animation:fadeInUp 0.6s 1.4s forwards;box-shadow:0 0 20px rgba(234,179,8,0.3);">
            Entrar
        </button>
    </div>
</div>

<!-- ===== Upload Screen ===== -->
<div id="uploadScreen" class="hidden min-h-screen flex items-center justify-center px-6 bg-zinc-950">
    <div class="text-center max-w-md w-full view-fade-enter">
        <div class="text-5xl mb-6">📊</div>
        <h2 class="text-3xl font-extrabold mb-2">Cargar Pronósticos</h2>
        <p id="uploadInfo" class="text-zinc-500 text-sm mb-6">Sube tu archivo Excel (.xlsx) para comenzar</p>
        <button onclick="loadExcel()"
            class="btn-glow w-full py-5 bg-yellow-400 text-black font-extrabold rounded-3xl text-xl hover:bg-yellow-300 transition">
            📂 Seleccionar Archivo
        </button>
        <button id="btnUsarGuardado" onclick="goToNext()"
            class="hidden w-full py-4 bg-zinc-800 text-yellow-400 font-bold rounded-2xl text-base mt-3 hover:bg-zinc-700 transition">
            📋 Usar datos guardados
        </button>
    </div>
</div>

<!-- ===== App Screen ===== -->
<div id="appScreen" class="hidden min-h-screen bg-zinc-950 flex flex-col">
    <div class="sticky top-0 glass border-b border-zinc-800 z-50">
        <div class="flex justify-between items-center px-4 pt-4 pb-2">
            <h1 class="text-xl font-extrabold gradient-gold">PRONOS CAMILOVEN</h1>
            <div class="flex items-center gap-2">
                <button onclick="requestNotifPermission()" id="btnNotif" title="Notificaciones"
                    class="text-zinc-500 text-sm bg-zinc-800 px-2 py-1 rounded-full hover:bg-zinc-700 transition hidden">
                    🔔
                </button>
                <button onclick="goToUpload()" class="text-yellow-400 text-sm bg-zinc-800 px-3 py-1 rounded-full hover:bg-zinc-700 transition">
                    ↑ Archivo
                </button>
            </div>
        </div>
        <div class="tabs-scroll px-4 pb-3" id="sportTabs"></div>
    </div>

    <div id="mainContent" class="flex-1 pb-32"></div>

    <div class="fixed bottom-0 left-0 right-0 glass border-t border-zinc-800 z-50">
        <div class="flex">
            <button onclick="switchView('pronos')" id="navPronos" class="nav-tab active text-yellow-400">
                <span class="nav-icon">📋</span>Pronos
            </button>
            <button onclick="switchView('live')" id="navLive" class="nav-tab text-zinc-400">
                <span class="nav-icon">🔴</span>Live
            </button>
            <button onclick="switchView('resultados')" id="navResultados" class="nav-tab text-zinc-400">
                <span class="nav-icon">📊</span>Result.
            </button>
            <button onclick="switchView('analisis')" id="navAnalisis" class="nav-tab text-zinc-400">
                <span class="nav-icon">🎯</span>Análisis
            </button>
            <button onclick="switchView('standings')" id="navStandings" class="nav-tab text-zinc-400">
                <span class="nav-icon">🏆</span>Tabla
            </button>
            <button onclick="switchView('config')" id="navConfig" class="nav-tab text-zinc-400">
                <span class="nav-icon">⚙️</span>Config
            </button>
        </div>
    </div>
</div>

<audio id="clickSound" preload="auto">
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
</audio>

<script src="app.js?v=5"></script>
<script>
// Partículas doradas
(function() {
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [], animId;
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2.5 + 0.5;
            this.speedY = -(Math.random() * 0.5 + 0.1);
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.6 + 0.1;
            this.life = 0;
            this.maxLife = Math.random() * 300 + 200;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY; this.life++;
            if (this.life > this.maxLife || this.y < -10) { this.reset(); this.y = canvas.height + 10; }
        }
        draw() {
            const fade = this.life < 30 ? this.life / 30 : this.life > this.maxLife - 30 ? (this.maxLife - this.life) / 30 : 1;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(234,179,8,${this.opacity * fade})`; ctx.fill();
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(234,179,8,${this.opacity * fade * 0.15})`; ctx.fill();
        }
    }
    for (let i = 0; i < 60; i++) particles.push(new Particle());
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); animId = requestAnimationFrame(animate); }
    animate();
    new MutationObserver(() => {
        if (document.getElementById('introScreen').style.display === 'none') cancelAnimationFrame(animId);
    }).observe(document.getElementById('introScreen'), { attributes: true, attributeFilter: ['style'] });
})();

// Título animado (progressive enhancement)
(function() {
    try {
        const title = document.getElementById('heroTitle');
        if (!title) return;
        const text = title.textContent || 'PRONOS CAMILOVEN';
        title.innerHTML = '';
        [...text].forEach((char, i) => {
            const span = document.createElement('span');
            span.textContent = char === ' ' ? '\u00A0' : char;
            span.style.display = 'inline-block';
            span.style.opacity = '0';
            span.style.transform = 'translateY(20px)';
            span.style.animation = 'letterIn 0.4s ' + (i * 0.04) + 's forwards';
            title.appendChild(span);
        });
    } catch(e) { /* title already visible from inline style */ }
})();

// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
